DISTRO_FEATURES:append = " openamp"
IMAGE_INSTALL:append = " packagegroup-openamp "

# The inherited KR260 starter-kit machine does not include this demo's OpenAMP
# domain. Bundle the product-specific DTSI only for the Linux device tree so it
# does not leak into FSBL/PMU/R5 standalone multiconfig device trees.
ENABLE_OPENAMP_DTSI ?= "2"
ENABLE_OPENAMP_DTSI:linux = "1"
